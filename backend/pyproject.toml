[tool.ruff]
target-version = "py311"
line-length = 150

[tool.ruff.lint]
# E/W: pycodestyle, F: pyflakes, I: isort
select = ["E", "W", "F", "I"]
ignore = [
    "E501",   # line too long — enforced by formatter, not linter
    "E741",   # ambiguous variable names (l, O, I) — existing code uses them
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
